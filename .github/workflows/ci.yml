name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: verify (${{ matrix.os }}, Python 3.12)
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
        with:
          version: "0.11.28"
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --frozen --python 3.12
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pytest -q
      - run: uv run odeya demo
      - run: uv run odeya verify-ledger --ledger evidence/keyed-demo-ledger.jsonl
